<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.2" result="blur1"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="gradCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4CF3FF"/>
      <stop offset="100%" stop-color="#2E9FFF"/>
    </linearGradient>
    <linearGradient id="gradMag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C25CFF"/>
      <stop offset="100%" stop-color="#FF5CA8"/>
    </linearGradient>
  </defs>

  <!-- hexagonal node ring : topologie reseau -->
  <g filter="url(#glow)" fill="none" stroke="url(#gradCyan)" stroke-width="2.2" stroke-linecap="round">
    <path d="M60 10 L100 33 L100 79 L60 102 L20 79 L20 33 Z"/>
    <line x1="60" y1="10" x2="60" y2="33"/>
    <line x1="100" y1="33" x2="76" y2="47"/>
    <line x1="100" y1="79" x2="76" y2="65"/>
    <line x1="60" y1="102" x2="60" y2="79"/>
    <line x1="20" y1="79" x2="44" y2="65"/>
    <line x1="20" y1="33" x2="44" y2="47"/>
  </g>

  <!-- noeuds -->
  <g filter="url(#glow)">
    <circle cx="60" cy="10" r="3.4" fill="url(#gradCyan)"/>
    <circle cx="100" cy="33" r="3.4" fill="url(#gradCyan)"/>
    <circle cx="100" cy="79" r="3.4" fill="url(#gradCyan)"/>
    <circle cx="60" cy="102" r="3.4" fill="url(#gradCyan)"/>
    <circle cx="20" cy="79" r="3.4" fill="url(#gradCyan)"/>
    <circle cx="20" cy="33" r="3.4" fill="url(#gradCyan)"/>
  </g>

  <!-- etincelle "forge" au centre, signature du logo -->
  <g filter="url(#glow)">
    <path d="M60 40 L69 58 L61 58 L67 82 L48 55 L57 55 Z" fill="url(#gradMag)"/>
  </g>
</svg>
